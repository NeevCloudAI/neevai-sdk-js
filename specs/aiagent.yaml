openapi: 3.0.3
info:
  title: AI Agent Service API
  description: |
    Manages sandboxes for the AI Supercloud platform. v1beta1 scope covers
    sandbox lifecycle (create, list, get, delete, pause/resume), live-health
    metrics, and memory snapshots (create, list, get, delete,
    restore, fork, from_snapshot create).
  version: 0.2.0
servers:
  - url: https://api.{env}.ai.neevcloud.com/agent
    description: Consolidated public API gateway
    variables:
      env:
        default: dev
        enum:
          - stg
          - dev
  - url: http://localhost:7011
    description: Local Development
security:
  - BearerAuth: []
paths:
  # Sandbox lifecycle: create, list, get, delete, pause, resume, metrics.
  /api/v1beta1/orgs/{org_id}/projects/{project_id}/sandboxes:
    get:
      tags: [Sandboxes]
      summary: List sandboxes in a project
      operationId: listSandboxes
      parameters:
        - {$ref: '#/components/parameters/OrgID'}
        - {$ref: '#/components/parameters/ProjectID'}
        - {$ref: '#/components/parameters/Page'}
        - {$ref: '#/components/parameters/Limit'}
      responses:
        "200":
          description: Paginated list of sandboxes
          content:
            application/json:
              schema: {$ref: '#/components/schemas/SandboxListResponse'}
        "401": {$ref: '#/components/responses/Unauthorized'}
        "403": {$ref: '#/components/responses/Forbidden'}
        "500": {$ref: '#/components/responses/InternalServerError'}
    post:
      tags: [Sandboxes]
      summary: Create a sandbox
      operationId: createSandbox
      parameters:
        - {$ref: '#/components/parameters/OrgID'}
        - {$ref: '#/components/parameters/ProjectID'}
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/CreateSandboxRequest'}
      responses:
        "201":
          description: Sandbox accepted; may still be provisioning (check `phase`)
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Sandbox'}
        "400": {$ref: '#/components/responses/BadRequest'}
        "401": {$ref: '#/components/responses/Unauthorized'}
        "403": {$ref: '#/components/responses/Forbidden'}
        "409": {$ref: '#/components/responses/Conflict'}
        "500": {$ref: '#/components/responses/InternalServerError'}
  /api/v1beta1/orgs/{org_id}/projects/{project_id}/sandboxes/{sandbox_id}:
    get:
      tags: [Sandboxes]
      summary: Get a sandbox by ID
      operationId: getSandbox
      parameters:
        - {$ref: '#/components/parameters/OrgID'}
        - {$ref: '#/components/parameters/ProjectID'}
        - {$ref: '#/components/parameters/SandboxID'}
      responses:
        "200":
          description: Sandbox details
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Sandbox'}
        "401": {$ref: '#/components/responses/Unauthorized'}
        "403": {$ref: '#/components/responses/Forbidden'}
        "404": {$ref: '#/components/responses/NotFound'}
        "500": {$ref: '#/components/responses/InternalServerError'}
    delete:
      tags: [Sandboxes]
      summary: Delete a sandbox
      operationId: deleteSandbox
      parameters:
        - {$ref: '#/components/parameters/OrgID'}
        - {$ref: '#/components/parameters/ProjectID'}
        - {$ref: '#/components/parameters/SandboxID'}
      responses:
        "204": {description: Sandbox deleted}
        "401": {$ref: '#/components/responses/Unauthorized'}
        "403": {$ref: '#/components/responses/Forbidden'}
        "404": {$ref: '#/components/responses/NotFound'}
        "500": {$ref: '#/components/responses/InternalServerError'}
  /api/v1beta1/orgs/{org_id}/projects/{project_id}/sandboxes/{sandbox_id}/pause:
    post:
      tags: [Sandboxes]
      summary: Pause a sandbox (stop billable runtime; preserve disks)
      description: |
        When `preserve_memory` is true the sandbox's full state (process memory
        + filesystem) is captured as an implicit snapshot before the pod is
        terminated. The snapshot is retained for the duration of the paused
        state and consumed automatically on the next `resume`. When false
        (default) the existing volume-only behaviour applies.
      operationId: pauseSandbox
      parameters:
        - {$ref: '#/components/parameters/OrgID'}
        - {$ref: '#/components/parameters/ProjectID'}
        - {$ref: '#/components/parameters/SandboxID'}
      requestBody:
        required: false
        content:
          application/json:
            schema: {$ref: '#/components/schemas/PauseSandboxRequest'}
      responses:
        "200":
          description: Sandbox paused
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Sandbox'}
        "400": {$ref: '#/components/responses/BadRequest'}
        "401": {$ref: '#/components/responses/Unauthorized'}
        "403": {$ref: '#/components/responses/Forbidden'}
        "404": {$ref: '#/components/responses/NotFound'}
        "500": {$ref: '#/components/responses/InternalServerError'}
  /api/v1beta1/orgs/{org_id}/projects/{project_id}/sandboxes/{sandbox_id}/resume:
    post:
      tags: [Sandboxes]
      summary: Resume a paused sandbox
      description: |
        Restores a paused sandbox. When the sandbox was paused with
        `preserve_memory=true` it resumes from the implicit memory snapshot;
        otherwise it cold-starts from the original image.
      operationId: resumeSandbox
      parameters:
        - {$ref: '#/components/parameters/OrgID'}
        - {$ref: '#/components/parameters/ProjectID'}
        - {$ref: '#/components/parameters/SandboxID'}
      responses:
        "200":
          description: Sandbox resumed
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Sandbox'}
        "401": {$ref: '#/components/responses/Unauthorized'}
        "403": {$ref: '#/components/responses/Forbidden'}
        "404": {$ref: '#/components/responses/NotFound'}
        "500": {$ref: '#/components/responses/InternalServerError'}
  # --- Sandbox Memory Snapshots ---
  /api/v1beta1/orgs/{org_id}/projects/{project_id}/sandboxes/{sandbox_id}/snapshots:
    get:
      tags: [Snapshots]
      summary: List snapshots taken from a sandbox
      description: Returns a paginated list of snapshots taken from this sandbox.
      operationId: listSandboxSnapshots
      parameters:
        - {$ref: '#/components/parameters/OrgID'}
        - {$ref: '#/components/parameters/ProjectID'}
        - {$ref: '#/components/parameters/SandboxID'}
        - {$ref: '#/components/parameters/Page'}
        - {$ref: '#/components/parameters/Limit'}
      responses:
        "200":
          description: Paginated list of snapshots
          content:
            application/json:
              schema: {$ref: '#/components/schemas/SnapshotListResponse'}
        "401": {$ref: '#/components/responses/Unauthorized'}
        "403": {$ref: '#/components/responses/Forbidden'}
        "404": {$ref: '#/components/responses/NotFound'}
        "500": {$ref: '#/components/responses/InternalServerError'}
    post:
      tags: [Snapshots]
      summary: Create a snapshot of a sandbox
      description: |
        Captures the full sandbox state (FS + process memory by default).
        Returns immediately with `status: Pending`; poll `GET /snapshots/{snapshot_id}`
        until `status: Ready`.
      operationId: createSandboxSnapshot
      parameters:
        - {$ref: '#/components/parameters/OrgID'}
        - {$ref: '#/components/parameters/ProjectID'}
        - {$ref: '#/components/parameters/SandboxID'}
      requestBody:
        required: false
        content:
          application/json:
            schema: {$ref: '#/components/schemas/CreateSnapshotRequest'}
      responses:
        "202":
          description: Snapshot accepted (status=Pending)
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Snapshot'}
        "400": {$ref: '#/components/responses/BadRequest'}
        "401": {$ref: '#/components/responses/Unauthorized'}
        "403": {$ref: '#/components/responses/Forbidden'}
        "404": {$ref: '#/components/responses/NotFound'}
        "500": {$ref: '#/components/responses/InternalServerError'}
  /api/v1beta1/orgs/{org_id}/projects/{project_id}/snapshots/{snapshot_id}:
    get:
      tags: [Snapshots]
      summary: Get snapshot metadata
      description: Returns snapshot metadata including current status and storage URI once ready.
      operationId: getSnapshot
      parameters:
        - {$ref: '#/components/parameters/OrgID'}
        - {$ref: '#/components/parameters/ProjectID'}
        - {$ref: '#/components/parameters/SnapshotID'}
      responses:
        "200":
          description: Snapshot details
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Snapshot'}
        "401": {$ref: '#/components/responses/Unauthorized'}
        "403": {$ref: '#/components/responses/Forbidden'}
        "404": {$ref: '#/components/responses/NotFound'}
        "500": {$ref: '#/components/responses/InternalServerError'}
    delete:
      tags: [Snapshots]
      summary: Delete a snapshot
      description: Deletes the snapshot metadata row. Blob GC is handled asynchronously by the platform.
      operationId: deleteSnapshot
      parameters:
        - {$ref: '#/components/parameters/OrgID'}
        - {$ref: '#/components/parameters/ProjectID'}
        - {$ref: '#/components/parameters/SnapshotID'}
      responses:
        "204": {description: Snapshot deleted}
        "401": {$ref: '#/components/responses/Unauthorized'}
        "403": {$ref: '#/components/responses/Forbidden'}
        "404": {$ref: '#/components/responses/NotFound'}
        "500": {$ref: '#/components/responses/InternalServerError'}
  /api/v1beta1/orgs/{org_id}/projects/{project_id}/sandboxes/{sandbox_id}/restore:
    post:
      tags: [Snapshots]
      summary: Restore a sandbox from a snapshot
      description: |
        Same-sandbox rollback. Stops the sandbox's processes, replaces FS+memory
        with the snapshot's state, and restarts. The sandbox keeps its UUID,
        name, and network identity. Destructive — current state is overwritten
        and not auto-archived.
      operationId: restoreSandbox
      parameters:
        - {$ref: '#/components/parameters/OrgID'}
        - {$ref: '#/components/parameters/ProjectID'}
        - {$ref: '#/components/parameters/SandboxID'}
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/RestoreSandboxRequest'}
      responses:
        "200":
          description: Sandbox restore accepted; check `phase` for progress.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Sandbox'}
        "400": {$ref: '#/components/responses/BadRequest'}
        "401": {$ref: '#/components/responses/Unauthorized'}
        "403": {$ref: '#/components/responses/Forbidden'}
        "404": {$ref: '#/components/responses/NotFound'}
        "500": {$ref: '#/components/responses/InternalServerError'}
  /api/v1beta1/orgs/{org_id}/projects/{project_id}/sandboxes/{sandbox_id}/fork:
    post:
      tags: [Snapshots]
      summary: Fork a sandbox into a new sandbox
      description: |
        Atomically snapshots the current sandbox state and creates a new sandbox
        from that snapshot. The original sandbox keeps running. Returns the new
        sandbox object.
      operationId: forkSandbox
      parameters:
        - {$ref: '#/components/parameters/OrgID'}
        - {$ref: '#/components/parameters/ProjectID'}
        - {$ref: '#/components/parameters/SandboxID'}
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/ForkSandboxRequest'}
      responses:
        "201":
          description: New forked sandbox
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Sandbox'}
        "400": {$ref: '#/components/responses/BadRequest'}
        "401": {$ref: '#/components/responses/Unauthorized'}
        "403": {$ref: '#/components/responses/Forbidden'}
        "404": {$ref: '#/components/responses/NotFound'}
        "409": {$ref: '#/components/responses/Conflict'}
        "500": {$ref: '#/components/responses/InternalServerError'}
  /api/v1beta1/orgs/{org_id}/projects/{project_id}/sandboxes/{sandbox_id}/metrics:
    get:
      tags: [Sandboxes]
      summary: Read live health metrics for a sandbox
      description: |
        Returns the bounded metric set for one sandbox (CPU / memory / disk
        plus lifecycle and rate series). `from` / `to` / `step` are optional
        and default to the last hour; the full v1 metric set is always
        returned (no metric selector).
      operationId: getSandboxMetrics
      parameters:
        - {$ref: '#/components/parameters/OrgID'}
        - {$ref: '#/components/parameters/ProjectID'}
        - {$ref: '#/components/parameters/SandboxID'}
        - name: from
          in: query
          required: false
          description: Start of the window (RFC3339). Defaults to one hour before `to`.
          schema: {type: string, format: date-time}
        - name: to
          in: query
          required: false
          description: End of the window (RFC3339). Defaults to now.
          schema: {type: string, format: date-time}
        - name: step
          in: query
          required: false
          description: Resolution (e.g. "60s", "5m"). Server clamps to a sane range.
          schema: {type: string}
      responses:
        "200":
          description: Metric series for the sandbox
          content:
            application/json:
              schema: {$ref: '#/components/schemas/SandboxMetricsResponse'}
        "400": {$ref: '#/components/responses/BadRequest'}
        "401": {$ref: '#/components/responses/Unauthorized'}
        "403": {$ref: '#/components/responses/Forbidden'}
        "404": {$ref: '#/components/responses/NotFound'}
        "500": {$ref: '#/components/responses/InternalServerError'}
  /api/v1beta1/sandbox-templates:
    get:
      tags: [Sandbox Templates]
      summary: List sandbox templates
      description: |
        Returns platform-managed sandbox runtime templates available for
        sandbox create. Only templates with status `active` or `deprecated`
        are returned. Registry paths are operator-internal and are not exposed.
      operationId: listSandboxTemplates
      parameters:
        - {$ref: '#/components/parameters/Page'}
        - {$ref: '#/components/parameters/Limit'}
      responses:
        "200":
          description: Paginated list of sandbox templates
          content:
            application/json:
              schema: {$ref: '#/components/schemas/SandboxTemplateListResponse'}
        "401": {$ref: '#/components/responses/Unauthorized'}
        "403": {$ref: '#/components/responses/Forbidden'}
        "500": {$ref: '#/components/responses/InternalServerError'}
  /api/v1beta1/sandbox-templates/{template_id}:
    get:
      tags: [Sandbox Templates]
      summary: Get a sandbox template
      description: |
        Returns one platform-managed sandbox template by id (e.g.
        `sb-ubuntu-26-04-minimal`). Use the template `name` at sandbox create.
      operationId: getSandboxTemplate
      parameters:
        - {$ref: '#/components/parameters/SandboxTemplateID'}
      responses:
        "200":
          description: Sandbox template details
          content:
            application/json:
              schema: {$ref: '#/components/schemas/SandboxTemplate'}
        "401": {$ref: '#/components/responses/Unauthorized'}
        "403": {$ref: '#/components/responses/Forbidden'}
        "404": {$ref: '#/components/responses/NotFound'}
        "500": {$ref: '#/components/responses/InternalServerError'}
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    OrgID:
      name: org_id
      in: path
      required: true
      description: Organization identifier.
      schema: {type: string}
    ProjectID:
      name: project_id
      in: path
      required: true
      description: Project identifier.
      schema: {type: string}
    SandboxID:
      name: sandbox_id
      in: path
      required: true
      description: Sandbox UUID.
      schema: {type: string, format: uuid}
    SnapshotID:
      name: snapshot_id
      in: path
      required: true
      description: Snapshot UUID.
      schema: {type: string, format: uuid}
    Page:
      name: page
      in: query
      required: false
      schema: {type: integer, minimum: 1, default: 1}
    SandboxTemplateID:
      name: template_id
      in: path
      required: true
      schema:
        type: string
        pattern: '^sb-[a-zA-Z0-9-]+$'
    Limit:
      name: limit
      in: query
      required: false
      schema: {type: integer, minimum: 1, maximum: 100, default: 20}
  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema: {$ref: '#/components/schemas/ErrorResponse'}
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema: {$ref: '#/components/schemas/ErrorResponse'}
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema: {$ref: '#/components/schemas/ErrorResponse'}
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema: {$ref: '#/components/schemas/ErrorResponse'}
    Conflict:
      description: Resource already exists
      content:
        application/json:
          schema: {$ref: '#/components/schemas/ErrorResponse'}
    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema: {$ref: '#/components/schemas/ErrorResponse'}
  schemas:
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error: {type: string}
        details: {type: string}
    EnvVar:
      type: object
      required: [name, value]
      properties:
        name: {type: string}
        value: {type: string}
    SandboxPhase:
      type: string
      enum: [Pending, Ready, NotReady, Unknown, Paused]
    SandboxResources:
      type: object
      description: |
        Sandbox compute size. Omitted fields use the platform default.
      properties:
        cpu:
          type: number
          minimum: 0.5
          maximum: 8
          multipleOf: 0.5
          example: 1
          description: vCPUs. Multiples of 0.5, from 0.5 to 8.
        memory_gb:
          type: integer
          minimum: 1
          maximum: 16
          example: 2
          description: Memory in GB, from 1 to 16.
        disk_gb:
          type: integer
          minimum: 10
          maximum: 100
          multipleOf: 10
          example: 10
          description: Ephemeral disk in GB. Multiples of 10, from 10 to 100.
    Sandbox:
      type: object
      required: [id, org_id, project_id, name, region, image, phase, replicas, created_at, updated_at]
      properties:
        id: {type: string, format: uuid}
        org_id: {type: string}
        project_id: {type: string}
        name: {type: string}
        region: {type: string, description: "Region where the sandbox runs.", example: "dev"}
        image: {type: string}
        command: {type: array, items: {type: string}}
        env: {type: array, items: {$ref: '#/components/schemas/EnvVar'}}
        resources: {$ref: '#/components/schemas/SandboxResources'}
        phase: {$ref: '#/components/schemas/SandboxPhase'}
        connect_url: {type: string, nullable: true, description: "Public URL the SDK calls (API key + X-Sandbox-Id). null when not configured."}
        replicas: {type: integer, minimum: 0, maximum: 1, description: "0 = paused, 1 = running."}
        egress:
          allOf:
            - $ref: '#/components/schemas/SandboxEgressConfig'
          nullable: true
        sandbox_template_id:
          type: string
          nullable: true
          description: Catalogue template id from create when one was provided; null otherwise.
        created_by:
          type: string
          nullable: true
          description: Identity that created the sandbox (user id, or API key id for key-authenticated calls); null for sandboxes created before this was recorded.
        created_at: {type: string, format: date-time}
        updated_at: {type: string, format: date-time}
    CreateSandboxRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 63
          pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
          description: |
            Sandbox name. Used verbatim as the Sandbox CR name and as a routing
            label, so it must be a valid DNS-1123 label: lowercase alphanumeric
            characters or '-', starting and ending with an alphanumeric, max 63
            characters.
          example: my-sandbox
        region: {type: string, description: "Region to provision in; omit to use the platform default.", example: "dev"}
        env: {type: array, items: {$ref: '#/components/schemas/EnvVar'}}
        resources: {$ref: '#/components/schemas/SandboxResources'}
        egress: {$ref: '#/components/schemas/SandboxEgressConfig'}
        lifecycle: {$ref: '#/components/schemas/SandboxLifecycleConfig'}
        sandbox_template_id:
          type: string
          minLength: 1
          pattern: '^sb-[a-zA-Z0-9-]+$'
          description: |
            Catalogue template id (e.g. sb-ubuntu-26-04-minimal). The server
            validates the template exists and is active, then provisions the
            sandbox image and command from that template.
        from_snapshot:
          type: string
          format: uuid
          nullable: true
          description: |
            When set, the new sandbox is restored from this snapshot instead of
            cold-starting from the image. Snapshot must belong to the same
            project. Sizing and region must match the snapshot's origin.
    PauseSandboxRequest:
      type: object
      description: Optional body for the pause endpoint.
      properties:
        preserve_memory:
          type: boolean
          default: true
          description: |
            When true, capture FS+process memory as an implicit snapshot before
            terminating the pod. The snapshot is auto-consumed on the next resume.
    # --- Snapshot schemas ---
    SnapshotStatus:
      type: string
      description: Lifecycle phase of a snapshot.
      enum: [Pending, Running, Ready, Failed]
    Snapshot:
      type: object
      required: [id, sandbox_id, org_id, project_id, status, include_memory, source_region, created_at, updated_at]
      description: Metadata for a sandbox memory/filesystem snapshot.
      properties:
        id: {type: string, format: uuid, description: Snapshot UUID.}
        sandbox_id: {type: string, format: uuid, description: UUID of the source sandbox.}
        org_id: {type: string}
        project_id: {type: string}
        name: {type: string, description: Optional customer-supplied name.}
        status: {$ref: '#/components/schemas/SnapshotStatus'}
        include_memory:
          type: boolean
          description: True = FS+memory captured; false = FS only.
        source_region: {type: string, description: DP cluster slug where the blob lives.}
        size_bytes:
          type: integer
          format: int64
          nullable: true
          description: Uncompressed blob size. Null until status=Ready.
        error_message:
          type: string
          nullable: true
          description: Failure detail. Null unless status=Failed.
        expires_at:
          type: string
          format: date-time
          nullable: true
          description: When the platform will GC this snapshot. Null = no expiry.
        created_at: {type: string, format: date-time}
        updated_at: {type: string, format: date-time}
    SnapshotListResponse:
      type: object
      required: [items, total, page, limit]
      properties:
        items: {type: array, items: {$ref: '#/components/schemas/Snapshot'}}
        total: {type: integer}
        page: {type: integer}
        limit: {type: integer}
    CreateSnapshotRequest:
      type: object
      description: Optional body for POST .../snapshots.
      properties:
        name:
          type: string
          description: Optional human-readable name for this snapshot.
        include_memory:
          type: boolean
          default: false
          description: Capture process memory in addition to filesystem. Currently forced to false (RootFS only); memory capture is not yet supported.
        retain_for:
          type: string
          description: |
            Duration string (e.g. "720h" = 30 days) controlling snapshot TTL.
            "0" or omitted means no expiry.
    RestoreSandboxRequest:
      type: object
      required: [snapshot_id]
      description: Body for POST .../sandboxes/{id}/restore.
      properties:
        snapshot_id:
          type: string
          format: uuid
          description: |
            UUID of the snapshot to restore from. Must belong to this sandbox
            or another sandbox in the same project.
    ForkSandboxRequest:
      type: object
      required: [name]
      description: Body for POST .../sandboxes/{id}/fork.
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 63
          pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
          description: Name for the new forked sandbox. Must be unique within the project.
    SandboxLifecycleConfig:
      type: object
      additionalProperties: false
      description: |
        Optional auto-shutdown policy. When ttl_seconds is set the sandbox is
        shut down roughly that many seconds after creation; omit for no expiry.
        Enforced by the agent-sandbox controller; not renewed on activity.
      properties:
        ttl_seconds:
          type: integer
          format: int64
          minimum: 1
          description: Seconds from creation after which the sandbox auto-expires. Omit for no expiry.
          example: 3600
    SandboxEgressConfig:
      type: object
      description: Network egress configuration rules for the sandbox.
      additionalProperties: false
      properties:
        mode:
          type: string
          enum: [deny_all, allow_list]
          default: deny_all
          description: The egress mode. deny_all blocks all egress. allow_list restricts egress to the specified allowed destinations.
        allow_internet:
          type: boolean
          description: "Escape hatch: if true, allows 0.0.0.0/0 (the entire internet). Strictly audit-logged."
          default: false
        allow:
          type: array
          description: List of egress rules for host/IP destinations to allow.
          items: {$ref: '#/components/schemas/SandboxEgressRule'}
    SandboxEgressRule:
      type: object
      description: Individual egress rule specifying allowed destination host.
      additionalProperties: false
      required: [host]
      properties:
        host: {type: string, description: "IP address, CIDR block, or domain name"}
        ports: {type: array, items: {type: integer}}
        protocol: {type: string, enum: [TCP, UDP]}
    SandboxListResponse:
      type: object
      required: [items, total, page, limit]
      properties:
        items: {type: array, items: {$ref: '#/components/schemas/Sandbox'}}
        total: {type: integer}
        page: {type: integer}
        limit: {type: integer}
    SandboxTemplateCategory:
      type: string
      enum: [standard, browser]
    SandboxTemplateStatus:
      type: string
      enum: [active, deprecated, disabled]
    SandboxTemplate:
      type: object
      required: [id, name, description, category, status, created_at, updated_at]
      properties:
        id:
          type: string
          pattern: '^sb-[a-zA-Z0-9-]+$'
        name:
          type: string
        description:
          type: string
        category:
          $ref: '#/components/schemas/SandboxTemplateCategory'
        status:
          $ref: '#/components/schemas/SandboxTemplateStatus'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    SandboxTemplateListResponse:
      type: object
      required: [items, total, page, limit]
      properties:
        items:
          type: array
          items: {$ref: '#/components/schemas/SandboxTemplate'}
        total: {type: integer}
        page: {type: integer}
        limit: {type: integer}
    MetricSeries:
      type: object
      required: [metric, points]
      properties:
        metric:
          type: string
          description: Stable metric key from the v1 catalogue (e.g. "cpu_usage_cores", "memory_usage_bytes").
        unit:
          type: string
          description: Unit of the values (e.g. "cores", "bytes", "count", "ratio").
        points:
          type: array
          description: Time-ordered [unix_seconds, value] pairs. Empty when the sandbox emitted no samples in the window.
          items:
            type: array
            items: {type: number, format: double}
    SandboxMetricsResponse:
      type: object
      required: [sandbox_id, from, to, step, series]
      properties:
        sandbox_id: {type: string, format: uuid}
        from: {type: string, format: date-time}
        to: {type: string, format: date-time}
        step: {type: string, description: "Resolution actually used after server-side clamping."}
        series: {type: array, items: {$ref: '#/components/schemas/MetricSeries'}}
tags: []
