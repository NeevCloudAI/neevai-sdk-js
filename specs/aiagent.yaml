openapi: 3.0.3
info:
  title: AI Agent Service API
  description: |
    Manages sandboxes for the AI Supercloud platform. v1 scope is the
    sandbox lifecycle (create, list, get, delete, pause/resume) plus the
    live-health metrics readout. File ops, exec, and secrets are out of
    scope for v1.
  version: 0.1.0
servers:
  - url: "https://agent.{env}.ai.neevcloud.com"
    description: |
      Agent Service base URL. `env` selects the deployment environment.
    variables:
      env:
        default: dev
        enum:
          - stg
          - dev
  - url: http://localhost:7011
    description: Local Development
security:
  - BearerAuth: []
paths:
  # Sandbox lifecycle: create, list, get, delete, pause, resume, metrics.
  /api/v1beta1/orgs/{org_id}/projects/{project_id}/sandboxes:
    get:
      tags: [Sandboxes]
      summary: List sandboxes in a project
      operationId: listSandboxes
      parameters:
        - {$ref: '#/components/parameters/OrgID'}
        - {$ref: '#/components/parameters/ProjectID'}
        - {$ref: '#/components/parameters/Page'}
        - {$ref: '#/components/parameters/Limit'}
      responses:
        "200":
          description: Paginated list of sandboxes
          content:
            application/json:
              schema: {$ref: '#/components/schemas/SandboxListResponse'}
        "401": {$ref: '#/components/responses/Unauthorized'}
        "403": {$ref: '#/components/responses/Forbidden'}
        "500": {$ref: '#/components/responses/InternalServerError'}
    post:
      tags: [Sandboxes]
      summary: Create a sandbox
      operationId: createSandbox
      parameters:
        - {$ref: '#/components/parameters/OrgID'}
        - {$ref: '#/components/parameters/ProjectID'}
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/CreateSandboxRequest'}
      responses:
        "201":
          description: Sandbox accepted; may still be provisioning (check `phase`)
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Sandbox'}
        "400": {$ref: '#/components/responses/BadRequest'}
        "401": {$ref: '#/components/responses/Unauthorized'}
        "403": {$ref: '#/components/responses/Forbidden'}
        "409": {$ref: '#/components/responses/Conflict'}
        "500": {$ref: '#/components/responses/InternalServerError'}
  /api/v1beta1/orgs/{org_id}/projects/{project_id}/sandboxes/{sandbox_id}:
    get:
      tags: [Sandboxes]
      summary: Get a sandbox by ID
      operationId: getSandbox
      parameters:
        - {$ref: '#/components/parameters/OrgID'}
        - {$ref: '#/components/parameters/ProjectID'}
        - {$ref: '#/components/parameters/SandboxID'}
      responses:
        "200":
          description: Sandbox details
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Sandbox'}
        "401": {$ref: '#/components/responses/Unauthorized'}
        "403": {$ref: '#/components/responses/Forbidden'}
        "404": {$ref: '#/components/responses/NotFound'}
        "500": {$ref: '#/components/responses/InternalServerError'}
    delete:
      tags: [Sandboxes]
      summary: Delete a sandbox
      operationId: deleteSandbox
      parameters:
        - {$ref: '#/components/parameters/OrgID'}
        - {$ref: '#/components/parameters/ProjectID'}
        - {$ref: '#/components/parameters/SandboxID'}
      responses:
        "204": {description: Sandbox deleted}
        "401": {$ref: '#/components/responses/Unauthorized'}
        "403": {$ref: '#/components/responses/Forbidden'}
        "404": {$ref: '#/components/responses/NotFound'}
        "500": {$ref: '#/components/responses/InternalServerError'}
  /api/v1beta1/orgs/{org_id}/projects/{project_id}/sandboxes/{sandbox_id}/pause:
    post:
      tags: [Sandboxes]
      summary: Pause a sandbox (stop billable runtime; preserve disks)
      operationId: pauseSandbox
      parameters:
        - {$ref: '#/components/parameters/OrgID'}
        - {$ref: '#/components/parameters/ProjectID'}
        - {$ref: '#/components/parameters/SandboxID'}
      responses:
        "200":
          description: Sandbox paused
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Sandbox'}
        "401": {$ref: '#/components/responses/Unauthorized'}
        "403": {$ref: '#/components/responses/Forbidden'}
        "404": {$ref: '#/components/responses/NotFound'}
        "500": {$ref: '#/components/responses/InternalServerError'}
  /api/v1beta1/orgs/{org_id}/projects/{project_id}/sandboxes/{sandbox_id}/resume:
    post:
      tags: [Sandboxes]
      summary: Resume a paused sandbox
      operationId: resumeSandbox
      parameters:
        - {$ref: '#/components/parameters/OrgID'}
        - {$ref: '#/components/parameters/ProjectID'}
        - {$ref: '#/components/parameters/SandboxID'}
      responses:
        "200":
          description: Sandbox resumed
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Sandbox'}
        "401": {$ref: '#/components/responses/Unauthorized'}
        "403": {$ref: '#/components/responses/Forbidden'}
        "404": {$ref: '#/components/responses/NotFound'}
        "500": {$ref: '#/components/responses/InternalServerError'}
  /api/v1beta1/orgs/{org_id}/projects/{project_id}/sandboxes/{sandbox_id}/metrics:
    get:
      tags: [Sandboxes]
      summary: Read live health metrics for a sandbox
      description: |
        Returns the bounded metric set for one sandbox (CPU / memory / disk
        plus lifecycle and rate series). `from` / `to` / `step` are optional
        and default to the last hour; the full v1 metric set is always
        returned (no metric selector).
      operationId: getSandboxMetrics
      parameters:
        - {$ref: '#/components/parameters/OrgID'}
        - {$ref: '#/components/parameters/ProjectID'}
        - {$ref: '#/components/parameters/SandboxID'}
        - name: from
          in: query
          required: false
          description: Start of the window (RFC3339). Defaults to one hour before `to`.
          schema: {type: string, format: date-time}
        - name: to
          in: query
          required: false
          description: End of the window (RFC3339). Defaults to now.
          schema: {type: string, format: date-time}
        - name: step
          in: query
          required: false
          description: Resolution (e.g. "60s", "5m"). Server clamps to a sane range.
          schema: {type: string}
      responses:
        "200":
          description: Metric series for the sandbox
          content:
            application/json:
              schema: {$ref: '#/components/schemas/SandboxMetricsResponse'}
        "400": {$ref: '#/components/responses/BadRequest'}
        "401": {$ref: '#/components/responses/Unauthorized'}
        "403": {$ref: '#/components/responses/Forbidden'}
        "404": {$ref: '#/components/responses/NotFound'}
        "500": {$ref: '#/components/responses/InternalServerError'}
  /api/v1beta1/sandbox-templates:
    get:
      tags: [Sandbox Templates]
      summary: List sandbox templates
      description: |
        Returns platform-managed sandbox runtime templates available for
        sandbox create. Only templates with status `active` or `deprecated`
        are returned. Registry paths are operator-internal and are not exposed.
      operationId: listSandboxTemplates
      parameters:
        - {$ref: '#/components/parameters/Page'}
        - {$ref: '#/components/parameters/Limit'}
      responses:
        "200":
          description: Paginated list of sandbox templates
          content:
            application/json:
              schema: {$ref: '#/components/schemas/SandboxTemplateListResponse'}
        "401": {$ref: '#/components/responses/Unauthorized'}
        "403": {$ref: '#/components/responses/Forbidden'}
        "500": {$ref: '#/components/responses/InternalServerError'}
  /api/v1beta1/sandbox-templates/{template_id}:
    get:
      tags: [Sandbox Templates]
      summary: Get a sandbox template
      description: |
        Returns one platform-managed sandbox template by id (e.g.
        `sb-ubuntu-26-04-minimal`). Use the template `name` at sandbox create.
      operationId: getSandboxTemplate
      parameters:
        - {$ref: '#/components/parameters/SandboxTemplateID'}
      responses:
        "200":
          description: Sandbox template details
          content:
            application/json:
              schema: {$ref: '#/components/schemas/SandboxTemplate'}
        "401": {$ref: '#/components/responses/Unauthorized'}
        "403": {$ref: '#/components/responses/Forbidden'}
        "404": {$ref: '#/components/responses/NotFound'}
        "500": {$ref: '#/components/responses/InternalServerError'}
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    OrgID:
      name: org_id
      in: path
      required: true
      description: Organization identifier.
      schema: {type: string}
    ProjectID:
      name: project_id
      in: path
      required: true
      description: Project identifier.
      schema: {type: string}
    SandboxID:
      name: sandbox_id
      in: path
      required: true
      description: Sandbox UUID.
      schema: {type: string, format: uuid}
    Page:
      name: page
      in: query
      required: false
      schema: {type: integer, minimum: 1, default: 1}
    SandboxTemplateID:
      name: template_id
      in: path
      required: true
      schema:
        type: string
        pattern: '^sb-[a-zA-Z0-9-]+$'
    Limit:
      name: limit
      in: query
      required: false
      schema: {type: integer, minimum: 1, maximum: 100, default: 20}
  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema: {$ref: '#/components/schemas/ErrorResponse'}
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema: {$ref: '#/components/schemas/ErrorResponse'}
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema: {$ref: '#/components/schemas/ErrorResponse'}
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema: {$ref: '#/components/schemas/ErrorResponse'}
    Conflict:
      description: Resource already exists
      content:
        application/json:
          schema: {$ref: '#/components/schemas/ErrorResponse'}
    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema: {$ref: '#/components/schemas/ErrorResponse'}
  schemas:
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error: {type: string}
        details: {type: string}
    EnvVar:
      type: object
      required: [name, value]
      properties:
        name: {type: string}
        value: {type: string}
    SandboxPhase:
      type: string
      enum: [Pending, Ready, NotReady, Unknown, Paused]
    SandboxResources:
      type: object
      description: |
        Sandbox compute size. Omitted fields use the platform default.
      properties:
        cpu:
          type: number
          minimum: 0.5
          maximum: 8
          multipleOf: 0.5
          example: 1
          description: vCPUs. Multiples of 0.5, from 0.5 to 8.
        memory_gb:
          type: integer
          minimum: 1
          maximum: 16
          example: 2
          description: Memory in GB, from 1 to 16.
        disk_gb:
          type: integer
          minimum: 10
          maximum: 100
          multipleOf: 10
          example: 10
          description: Ephemeral disk in GB. Multiples of 10, from 10 to 100.
    Sandbox:
      type: object
      required: [id, org_id, project_id, name, region, image, phase, replicas, created_at, updated_at]
      properties:
        id: {type: string, format: uuid}
        org_id: {type: string}
        project_id: {type: string}
        name: {type: string}
        region: {type: string, description: "Region where the sandbox runs.", example: "dev"}
        image: {type: string}
        command: {type: array, items: {type: string}}
        env: {type: array, items: {$ref: '#/components/schemas/EnvVar'}}
        resources: {$ref: '#/components/schemas/SandboxResources'}
        phase: {$ref: '#/components/schemas/SandboxPhase'}
        connect_url: {type: string, nullable: true, description: "Public URL the SDK calls (API key + X-Sandbox-Id). null when not configured."}
        replicas: {type: integer, minimum: 0, maximum: 1, description: "0 = paused, 1 = running."}
        egress:
          allOf:
            - $ref: '#/components/schemas/SandboxEgressConfig'
          nullable: true
        sandbox_template_id:
          type: string
          nullable: true
          description: Catalogue template id from create when one was provided; null otherwise.
        created_by:
          type: string
          nullable: true
          description: Identity that created the sandbox (user id, or API key id for key-authenticated calls); null for sandboxes created before this was recorded.
        created_at: {type: string, format: date-time}
        updated_at: {type: string, format: date-time}
    CreateSandboxRequest:
      type: object
      required: [name, sandbox_template_id]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 63
          pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
          description: |
            Sandbox name. Used verbatim as the Sandbox CR name and as a routing
            label, so it must be a valid DNS-1123 label: lowercase alphanumeric
            characters or '-', starting and ending with an alphanumeric, max 63
            characters.
          example: my-sandbox
        region: {type: string, description: "Region to provision in; omit to use the platform default.", example: "dev"}
        image:
          type: string
          minLength: 1
          description: |
            Ignored when sandbox_template_id is set. Reserved for future BYOI;
            the server resolves the container image from the selected template.
        command:
          type: array
          items: {type: string}
          description: |
            Ignored when sandbox_template_id is set. The server uses the
            catalogue template default command.
        env: {type: array, items: {$ref: '#/components/schemas/EnvVar'}}
        resources: {$ref: '#/components/schemas/SandboxResources'}
        egress: {$ref: '#/components/schemas/SandboxEgressConfig'}
        sandbox_template_id:
          type: string
          minLength: 1
          pattern: '^sb-[a-zA-Z0-9-]+$'
          description: |
            Catalogue template id (e.g. sb-ubuntu-26-04-minimal). The server
            validates the template exists and is active, then provisions the
            sandbox image and command from that template.
    SandboxEgressConfig:
      type: object
      description: Network egress configuration rules for the sandbox.
      additionalProperties: false
      properties:
        mode:
          type: string
          enum: [deny_all, allow_list]
          default: deny_all
          description: The egress mode. deny_all blocks all egress. allow_list restricts egress to the specified allowed destinations.
        allow_internet:
          type: boolean
          description: "Escape hatch: if true, allows 0.0.0.0/0 (the entire internet). Strictly audit-logged."
          default: false
        allow:
          type: array
          description: List of egress rules for host/IP destinations to allow.
          items: {$ref: '#/components/schemas/SandboxEgressRule'}
    SandboxEgressRule:
      type: object
      description: Individual egress rule specifying allowed destination host.
      additionalProperties: false
      required: [host]
      properties:
        host: {type: string, description: "IP address, CIDR block, or domain name"}
        ports: {type: array, items: {type: integer}}
        protocol: {type: string, enum: [TCP, UDP]}
    SandboxListResponse:
      type: object
      required: [items, total, page, limit]
      properties:
        items: {type: array, items: {$ref: '#/components/schemas/Sandbox'}}
        total: {type: integer}
        page: {type: integer}
        limit: {type: integer}
    SandboxTemplateCategory:
      type: string
      enum: [standard, browser]
    SandboxTemplateStatus:
      type: string
      enum: [active, deprecated, disabled]
    SandboxTemplate:
      type: object
      required: [id, name, description, category, status, created_at, updated_at]
      properties:
        id:
          type: string
          pattern: '^sb-[a-zA-Z0-9-]+$'
        name:
          type: string
        description:
          type: string
        category:
          $ref: '#/components/schemas/SandboxTemplateCategory'
        status:
          $ref: '#/components/schemas/SandboxTemplateStatus'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    SandboxTemplateListResponse:
      type: object
      required: [items, total, page, limit]
      properties:
        items:
          type: array
          items: {$ref: '#/components/schemas/SandboxTemplate'}
        total: {type: integer}
        page: {type: integer}
        limit: {type: integer}
    MetricSeries:
      type: object
      required: [metric, points]
      properties:
        metric:
          type: string
          description: Stable metric key from the v1 catalogue (e.g. "cpu_usage_cores", "memory_usage_bytes").
        unit:
          type: string
          description: Unit of the values (e.g. "cores", "bytes", "count", "ratio").
        points:
          type: array
          description: Time-ordered [unix_seconds, value] pairs. Empty when the sandbox emitted no samples in the window.
          items:
            type: array
            items: {type: number, format: double}
    SandboxMetricsResponse:
      type: object
      required: [sandbox_id, from, to, step, series]
      properties:
        sandbox_id: {type: string, format: uuid}
        from: {type: string, format: date-time}
        to: {type: string, format: date-time}
        step: {type: string, description: "Resolution actually used after server-side clamping."}
        series: {type: array, items: {$ref: '#/components/schemas/MetricSeries'}}
tags: []
